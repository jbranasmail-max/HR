@media print {

 -webkit-print-color-adjust: exact;

    font-family: 'Noto Sans Arabic', sans-serif;
}
</style>
<script>
// تحويل أي نصوص عربية في SVG بشكل آمن
function utf8_to_b64(str) {
    return window.btoa(unescape(encodeURIComponent(str)));
}

// تجهيز المحتوى قبل الحفظ
async function prepareContent(container) {
    // تحويل كل Canvas (Chart.js) إلى صور
    container.querySelectorAll('canvas').forEach(canvas => {
        try {
            if (canvas.chart) {
                const img = new Image();
                img.src = canvas.chart.toBase64Image();
                img.style.width = canvas.style.width || canvas.width + "px";
                img.style.height = canvas.style.height || canvas.height + "px";
                canvas.parentNode.replaceChild(img, canvas);
            }
        } catch(e){ console.warn(e); }
    });

    // تحويل كل SVG إلى صور
    container.querySelectorAll('svg').forEach(svg => {
        try {
            const xml = new XMLSerializer().serializeToString(svg);
            const img64 = utf8_to_b64(xml);
            const img = new Image();
            img.src = 'data:image/svg+xml;base64,' + img64;
            img.style.width = svg.style.width || svg.getBoundingClientRect().width + "px";
            img.style.height = svg.style.height || svg.getBoundingClientRect().height + "px";
            svg.parentNode.replaceChild(img, svg);
        } catch(e){ console.warn(e); }
    });

    // التأكد من تحميل كل الصور <img>
    const images = container.querySelectorAll('img');
    for (let img of images) {
        if (!img.complete) {
            await new Promise(resolve => { img.onload = img.onerror = resolve; });
        }
    }

    await new Promise(r => setTimeout(r, 300));
}

// فتح المودال
function showSaveModal() {
    const modal = new bootstrap.Modal(document.getElementById('saveReportModal'));
    modal.show();
}

// حفظ التقرير كـ PDF أو Excel
async function saveReport() {
    const personName = document.getElementById('personName').value.trim();
    const reportType = document.getElementById('reportType').value;
    const format = document.getElementById('format').value;

    if (!personName || !reportType) {
        alert('يرجى كتابة اسم الشخص واختيار نوع التقرير');
        return;
    }

    const fileName = personName + '_' + reportType;
    const element = document.getElementById('reportContent');

    // إخفاء الأقسام المراد إخفاؤها أثناء الحفظ
    const hideElements = document.querySelectorAll('.stats-section, .search-section');
    hideElements.forEach(el => el.style.display = 'none');

    try {
        await prepareContent(element);

        // ===== PDF =====
        if (format === 'pdf' || format === 'all') {
            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF('p', 'pt', 'a4');
            const pageWidth = pdf.internal.pageSize.getWidth();
            const pageHeight = pdf.internal.pageSize.getHeight();
            const margin = 20;

            const canvas = await html2canvas(element, {
                scale: 2,
                useCORS: true,
                allowTaint: true,
                scrollY: -window.scrollY,
                backgroundColor: "#ffffff"
            });

            const imgData = canvas.toDataURL('image/jpeg', 1.0);
            const imgWidth = pageWidth - 2 * margin;
            const imgHeight = canvas.height * (imgWidth / canvas.width);

            if (imgHeight <= pageHeight - 2 * margin) {
                pdf.addImage(imgData, 'JPEG', margin, margin, imgWidth, imgHeight);
            } else {
                let position = 0;
                let remainingHeight = canvas.height;
                const pageCanvasHeight = (pageHeight - 2 * margin) * (canvas.width / imgWidth);

                while (remainingHeight > 0) {
                    const tempCanvas = document.createElement('canvas');
                    tempCanvas.width = canvas.width;
                    tempCanvas.height = Math.min(pageCanvasHeight, remainingHeight);
                    const ctx = tempCanvas.getContext('2d');
                    ctx.fillStyle = "#ffffff";
                    ctx.fillRect(0, 0, tempCanvas.width, tempCanvas.height);
                    ctx.drawImage(canvas, 0, position, canvas.width, tempCanvas.height, 0, 0, canvas.width, tempCanvas.height);

                    const pageImgData = tempCanvas.toDataURL('image/jpeg', 1.0);
                    pdf.addImage(pageImgData, 'JPEG', margin, margin, imgWidth, (tempCanvas.height * imgWidth / canvas.width));

                    remainingHeight -= tempCanvas.height;
                    position += tempCanvas.height;

                    if (remainingHeight > 0) pdf.addPage();
                }
            }

            pdf.save(fileName + '.pdf');
        }

        // ===== Excel =====
        if (format === 'excel' || format === 'all') {
            const table = element.querySelector("table");
            const wb = XLSX.utils.book_new();

            if (!table) {
                const ws = XLSX.utils.aoa_to_sheet([[element.innerText]]);
                XLSX.utils.book_append_sheet(wb, ws, "Sheet1");
            } else {
                const ws = XLSX.utils.table_to_sheet(table, { raw: true });
                const range = XLSX.utils.decode_range(ws['!ref']);
                for (let R = range.s.r; R <= range.e.r; ++R) {
                    for (let C = range.s.c; C <= range.e.c; ++C) {
                        const cell_ref = XLSX.utils.encode_cell({ c: C, r: R });
                        if (!ws[cell_ref]) continue;
                        ws[cell_ref].s = {
                            fill: { fgColor: { rgb: "FFFFFF" } },
                            font: { color: { rgb: "000000" }, bold: false },
                            alignment: { horizontal: "center", vertical: "center", wrapText: true }
                        };
                    }
                }

                ws['!cols'] = Array(range.e.c - range.s.c + 1).fill({ wpx: 120 });
                ws['!print'] = { horizontalCentered: true };
                XLSX.utils.book_append_sheet(wb, ws, "Sheet1");
            }

            XLSX.writeFile(wb, fileName + ".xlsx");
        }

    } catch (err) {
        console.error("حدث خطأ أثناء الحفظ:", err);
        alert("حدث خطأ أثناء حفظ التقرير. تحقق من Console.");
    } finally {
        // إعادة ظهور الأقسام بعد الحفظ
        hideElements.forEach(el => el.style.display = '');
        const modal = bootstrap.Modal.getInstance(document.getElementById('saveReportModal'));
        if(modal) modal.hide();
    }
}
</script>
