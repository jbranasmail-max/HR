{% load static %}
<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>تسجيل الدخول</title>

    <!-- Bootstrap محلي -->
    <link href="{% static 'css/bootstrap.min.css' %}" rel="stylesheet">

    <!-- CSS مخصص -->
    <link href="{% static 'css/custom-admin.css' %}" rel="stylesheet">

    <style>
        body {
            background: #f0f2f5;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            direction: rtl; /* اجعل النصوص من اليمين */
        }
        .login-card {
            background: #fff;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            width: 400px;
            max-width: 90%;
        }
        h2 {
            text-align: center;
            margin-bottom: 30px;
            color: #333;
        }
        label, input, button {
            text-align: right; /* النص داخل الحقول من اليمين */
        }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>تسجيل الدخول</h2>

        {% if error %}
    {% if error != "" %}
        <div class="alert alert-danger text-center" role="alert">
            {{ error }}
        </div>
    {% endif %}
{% endif %}


        <form method="post" autocomplete="off">
            {% csrf_token %}
            <div class="mb-3">
                <label for="username" class="form-label">اسم المستخدم:</label>
                <input type="text" class="form-control" id="username" name="username"
                       placeholder="أدخل اسم المستخدم" required autocomplete="off">
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">كلمة المرور:</label>
                <input type="password" class="form-control" id="password" name="password"
                       placeholder="أدخل كلمة المرور" required autocomplete="new-password">
            </div>
            <button type="submit" class="btn btn-primary w-100">دخول</button>
        </form>
    </div>

    <!-- JS Bootstrap محلي -->
    <script src="{% static 'js/bootstrap.bundle.min.js' %}"></script>
</body>
</html>  <!-- HR/templates/login.html -->
